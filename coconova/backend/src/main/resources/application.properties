# Server port - Render/Railway inject PORT automatically
server.port=${PORT:8080}

# --- Database ---
# Default: file-based H2 database, zero external setup needed. Good to get deployed fast.
# NOTE: on most free hosts the disk is ephemeral, so H2 data resets on redeploy/restart.
# To use a persistent free Postgres instead (recommended for anything beyond testing),
# set these environment variables in your hosting dashboard and they will override the
# defaults below automatically (Spring Boot relaxed binding):
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:<port>/<database>
#   SPRING_DATASOURCE_USERNAME=<user>
#   SPRING_DATASOURCE_PASSWORD=<password>
#   SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
spring.datasource.url=jdbc:h2:file:./data/coconova;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- CORS ---
# Set to your deployed frontend URL once you know it, e.g. https://coconova.vercel.app
ALLOWED_ORIGIN=*

# --- Admin key for viewing contact submissions via GET /api/contact?key=... ---
ADMIN_KEY=changeme
